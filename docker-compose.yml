services:
  postgres:
    image: postgres:15
    container_name: trackbackai-db
    environment:
      POSTGRES_DB: trackback-ai_DB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Samdave12
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trackback-ai_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: trackbackai-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: 'postgresql://postgres:Samdave12@postgres:5432/trackback-ai_DB'
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: Samdave12
      DB_NAME: trackback-ai_DB
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET: ${S3_BUCKET}
      ML_SERVICE_URL: http://ml-service:5000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3005
      SOCKET_PORT: 3001
      CORS_ORIGIN: http://localhost:3005
      ALLOWED_ORIGINS: http://localhost:3005,http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  ml-service:
    build: ./ml-service
    container_name: trackbackai-ml
    command: python app.py
    ports:
      - "5000:5000"
    volumes:
      - ./ml-service:/app
    environment:
      FLASK_ENV: development
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET: ${S3_BUCKET}
      BACKEND_API_URL: http://backend:3001
      PYTHONUNBUFFERED: 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build: ./frontend
    container_name: trackbackai-frontend
    stdin_open: true
    tty: true
    ports:
      - "3005:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
      - REACT_APP_API_URL=http://localhost:3001
      - REACT_APP_SOCKET_URL=http://localhost:3001
      - REACT_APP_VERSION=1.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/node_modules/.cache
    depends_on:
      backend:
        condition: service_healthy
    command: npm start
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  adminer:
    image: adminer:latest
    container_name: trackbackai-adminer
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    depends_on:
      - postgres

volumes:
  postgres_data: