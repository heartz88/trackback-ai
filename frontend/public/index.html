<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/logo.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#20918b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>TrackBackAI | Music Collaboration</title>
    
    <script>
            // iOS ONE-TAP FIX - Disable double-tap detection
        (function() {
        // Check if this is a touch device
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        if (isTouchDevice) {
            // Disable double-tap detection by preventing the browser from waiting
            let lastTouchEnd = 0;
            
            document.addEventListener('touchend', function(e) {
            const now = Date.now();
            // If this is a double-tap (within 300ms), prevent it
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
                // Immediately trigger a click event
                const target = e.target;
                const clickEvent = new MouseEvent('click', {
                view: window,
                bubbles: true,
                cancelable: true
                });
                target.dispatchEvent(clickEvent);
            }
            lastTouchEnd = now;
            }, false);
            
            // Also add a style to disable hover effects
            const style = document.createElement('style');
            style.textContent = `
            button, a, [role="button"], .btn-primary, .btn-secondary {
                transition: none !important;
                transform: none !important;
            }
            button:hover, a:hover, [role="button"]:hover,
            .btn-primary:hover, .btn-secondary:hover,
            [class*="hover:"]:hover {
                transform: none !important;
                box-shadow: none !important;
                transition: none !important;
            }
            .hover\\:-translate-y-0\\.5:hover {
                transform: none !important;
            }
            `;
            document.head.appendChild(style);
            
            console.log('✅ iOS one-tap fix applied');
        }
        })();
    </script>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
</body>
</html>
