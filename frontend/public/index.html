<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/logo.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
    
    <meta name="theme-color" content="#20918b" />
    
    <title>TrackBackAI | Music Collaboration</title>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script>
      // Simple fix to ensure inputs have proper font size to prevent iOS zoom
      (function() {
        // Only ensure inputs have proper font size - NO event blocking
        const ensureInputFontSize = function() {
          const inputs = document.querySelectorAll('input, textarea, select');
          inputs.forEach(input => {
            const fontSize = window.getComputedStyle(input).fontSize;
            if (parseInt(fontSize) < 16) {
              input.style.fontSize = '16px';
            }
          });
        };
        
        // Run on load and after DOM changes
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', ensureInputFontSize);
        } else {
          ensureInputFontSize();
        }
        
        const observer = new MutationObserver(ensureInputFontSize);
        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
</body>
</html>
