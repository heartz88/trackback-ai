<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/logo.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#20918b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>TrackBackAI | Music Collaboration</title>
    <style>
      /* Belt-and-braces iOS one-tap fix — runs before React, before Tailwind,
         before anything. This is the last line of defence. */
      * {
        -webkit-tap-highlight-color: transparent !important;
        touch-action: manipulation !important;
      }
      a, button, input, select, textarea, [role="button"] {
        touch-action: manipulation !important;
        cursor: pointer;
      }
    </style>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      // iOS 300ms tap delay killer — runs before React mounts.
      // Converts touchend directly to click so iOS never gets
      // a chance to wait for a double-tap.
      (function() {
        var needsFix = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        if (!needsFix) return;

        document.addEventListener('touchend', function(e) {
          var t = e.target;
          // Walk up to find the real interactive element
          while (t && t !== document.body) {
            var tag = t.tagName;
            var role = t.getAttribute('role');
            if (
              tag === 'BUTTON' ||
              tag === 'A' ||
              tag === 'INPUT' ||
              tag === 'SELECT' ||
              tag === 'TEXTAREA' ||
              role === 'button'
            ) {
              // Only fire if this was a real tap (not a scroll)
              if (e.changedTouches && e.changedTouches.length === 1) {
                var touch = e.changedTouches[0];
                // If finger barely moved it's a tap not a scroll
                if (Math.abs(touch.clientX - touch.clientX) < 10 &&
                    Math.abs(touch.clientY - touch.clientY) < 10) {
                  e.preventDefault();
                  t.click();
                }
              }
              break;
            }
            t = t.parentElement;
          }
        }, { passive: false });
      })();
    </script>
</body>
</html>
