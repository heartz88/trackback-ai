<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/logo.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes, viewport-fit=cover" />
    
    <meta name="theme-color" content="#20918b" />
    
    <title>TrackBackAI | Music Collaboration</title>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script>
      (function() {
        // Check if we need to handle the 300ms delay (older iOS versions)
        var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        
        if (isIOS) {
          // Add touch-action: manipulation to all interactive elements via CSS
          var style = document.createElement('style');
          style.textContent = `
            button, a, input, select, textarea, label, [role="button"] {
              touch-action: manipulation;
            }
          `;
          document.head.appendChild(style);
        }
        
        // Prevent double-tap zoom on buttons (optional)
        document.addEventListener('touchstart', function(e) {
          var el = e.target;
          var isInteractive = el.matches && (
            el.matches('button, a, input, select, textarea, [role="button"]') ||
            el.closest('button, a, input, select, textarea, [role="button"]')
          );
          
          if (isInteractive) {
            // Prevent double-tap zoom on interactive elements
            e.preventDefault();
          }
        }, { passive: false });
      })();
    </script>
</body>
</html>
